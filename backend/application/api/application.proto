syntax="proto3";

package application;
option go_package = "github.com/unwelcome/FrameWorkTask1/backend/application/api/generated;application_proto";

import "google/protobuf/empty.proto";

service ApplicationService {
  rpc Health(HealthRequest) returns (HealthResponse);
  rpc CreateApplication(CreateApplicationRequest) returns (CreateApplicationResponse);
  rpc GetApplication(GetApplicationRequest) returns (GetApplicationResponse);
  rpc GetApplications(GetApplicationsRequest) returns (GetApplicationsResponse);
  rpc GetCompanyApplicationStatistic(GetCompanyApplicationStatisticRequest) returns (GetCompanyApplicationStatisticResponse);
  rpc GetEmployeeApplicationStatistic(GetEmployeeApplicationStatisticRequest) returns (GetEmployeeApplicationStatisticResponse);
  rpc UpdateApplicationStatus(UpdateApplicationStatusRequest) returns (google.protobuf.Empty);
  rpc AssignApplicationToEmployee(AssignApplicationToEmployeeRequest) returns (google.protobuf.Empty);
  rpc TransferApplication(TransferApplicationRequest) returns (google.protobuf.Empty);
  rpc AddApplicationFixLog(AddApplicationFixLogRequest) returns (google.protobuf.Empty);
  rpc DeleteApplication(DeleteApplicationRequest) returns (google.protobuf.Empty);
}


message Application {
  string application_uuid = 1;
  string company_uuid = 2;
  string department_uuid = 3;
  string title = 4;
  string description = 5;
  string status = 6;
  string responsible_manager = 7;
  string responsible_engineer = 8;
  string created_at = 9;
  string created_by = 10;
  string closed_at = 11;
  string deleted_at = 12;
  repeated FixLog fix_logs = 13;
}

message FixLog {
  string uuid = 1;
  string text = 2;
  string created_at = 3;
  string created_by = 4;
}

message ApplicationData {
  string title = 1;
  string description = 2;
}


// Health
message HealthRequest {
  string operation_id = 1;
}
message HealthResponse {
  string service = 1;
  string postgres = 2;
  string redis = 3;
  string minio = 4;
  string mongo = 5;
}


// CreateApplication
message CreateApplicationRequest {
  string operation_id = 1;
  string initiator_uuid = 2;
  string company_uuid = 3;
  string title = 4;
  string description = 5;
}
message CreateApplicationResponse {
  string application_uuid = 1;
}


// GetApplication
message GetApplicationRequest {
  string operation_id = 1;
  string initiator_uuid = 2;
  string application_uuid = 3;
}
message GetApplicationResponse {
  Application application = 1;
}


// GetApplications
message GetApplicationsRequest {
  string operation_id = 1;
  string initiator_uuid = 2;
  string company_uuid = 3;
  string department_uuid = 4;
  string status = 5;
  int64 count = 6;
  int64 offset = 7;
}
message GetApplicationsResponse {
  repeated Application applications = 1;
}


// GetCompanyApplicationStatistic
message GetCompanyApplicationStatisticRequest {
  string operation_id = 1;
  string initiator_uuid = 2;
  string company_uuid = 3;
}
message GetCompanyApplicationStatisticResponse {
  int64 created = 1;
  int64 assigned = 2;
  int64 redirected = 3;
  int64 rejected = 4;
  int64 in_progress = 5;
  int64 on_hold = 6;
  int64 awaiting_approval = 7;
  int64 completed = 8;
  int64 cancelled = 9;
  int64 failed = 10;
  int64 archived = 11;
}


// GetEmployeeApplicationStatistic
message GetEmployeeApplicationStatisticRequest {
  string operation_id = 1;
  string initiator_uuid = 2;
  string company_uuid = 3;
  string target_uuid = 4;
}
message GetEmployeeApplicationStatisticResponse {
  int64 created = 1; // Сколько пользователь создал задач 
  int64 assigned = 2; // Сколько у пользователя текущих задач
  int64 redirected = 3; // Сколько у пользователя переданных в другой департамент задач
  int64 rejected = 4; // Сколько у пользователя отклоненных задач
  int64 in_progress = 5; // Сколько у пользователя задач на выполнении
  int64 on_hold = 6; // Сколько у пользователя задач на паузе
  int64 awaiting_approval = 7; // Сколько у пользователя задач ожидают подтверждения
  int64 completed = 8; // Сколько пользователь завершил задач
  int64 cancelled = 9; // Сколько пользователь отменил задач
  int64 failed = 10; // Сколько пользователь провалил задач
  int64 archived = 11; // Сколько пользователь заморозил задач
}


// UpdateApplicationStatus
message UpdateApplicationStatusRequest {
  string operation_id = 1;
  string initiator_uuid = 2;
  string application_uuid = 3;
  string status = 4;
}
// Empty response


// AssignApplicationToEmployee
message AssignApplicationToEmployeeRequest {
  string operation_id = 1;
  string initiator_uuid = 2;
  string target_uuid = 3;
  string application_uuid = 4;
}
// Empty response


// TransferApplication
message TransferApplicationRequest {
  string operation_id = 1;
  string initiator_uuid = 2;
  string application_uuid = 3;
  string target_department_uuid = 4;
}
// Empty response


// AddApplicationFixLog
message AddApplicationFixLogRequest {
  string operation_id = 1;
  string initiator_uuid = 2;
  string application_uuid = 3;
  string log_text = 4;
}
// Empty response


// DeleteApplication
message DeleteApplicationRequest {
  string operation_id = 1;
  string initiator_uuid = 2;
  string application_uuid = 3;
}
// Empty response