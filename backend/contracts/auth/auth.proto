syntax="proto3";

package auth;
option go_package = "github.com/unwelcome/FrameWorkTask1/backend/contracts/auth/generated;auth_proto";

import "google/protobuf/empty.proto";

service AuthService {
  rpc Health(google.protobuf.Empty) returns (HealthResponse);
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc ChangePassword(ChangePasswordRequest) returns (google.protobuf.Empty);
  rpc UpdateUserBio(UpdateUserBioRequest) returns (google.protobuf.Empty);
  rpc DeleteUser(DeleteUserRequest) returns (google.protobuf.Empty);
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
  rpc GetAllActiveTokens(GetAllActiveTokensRequest) returns (GetAllActiveTokensResponse);
  rpc RevokeToken(RevokeTokenRequest) returns (google.protobuf.Empty);
  rpc RevokeAllTokens(RevokeAllTokensRequest) returns (google.protobuf.Empty);
}


message Token {
  string token = 1;
}


// Health
// Empty request
message HealthResponse {
  string service = 1;
  string postgres = 2;
  string redis = 3;
  string minio = 4;
  string mongo = 5;
}


// Register user
message RegisterRequest {
  string email = 1;
  string password = 2;
  string first_name = 3;
  string last_name = 4;
  string patronymic = 5;
}
message RegisterResponse {
  string user_uuid = 1;
}


// Login
message LoginRequest {
  string email = 1;
  string password = 2;
}
message LoginResponse {
  string user_uuid = 1;
  string access_token = 2;
  string refresh_token = 3;
}


// Get user
message GetUserRequest {
  string user_uuid = 1;
}
message GetUserResponse {
  string user_uuid = 1;
  string email = 2;
  string first_name = 3;
  string last_name = 4;
  string patronymic = 5;
  string created_at = 6;
}


// Change user password
message ChangePasswordRequest {
  string user_uuid = 1;
  string password = 2;
}
// Empty response


// Update user bio
message UpdateUserBioRequest {
  string user_uuid = 1;
  string first_name = 2;
  string last_name = 3;
  string patronymic = 4;
}
// Empty response


// Delete user
message DeleteUserRequest {
  string initiator_user_uuid = 1;
  string target_user_uuid = 2;
}
// Empty response


// Refresh token
message RefreshTokenRequest {
  string refresh_token = 1;
}
message RefreshTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
}


// Get all user active refresh tokens
message GetAllActiveTokensRequest {
  string user_uuid = 1;
}
message GetAllActiveTokensResponse{
  repeated Token tokens = 1;
}


// Revoke token
message RevokeTokenRequest {
  string user_uuid = 1;
  string token_hash = 2;
}
// Empty response


// Revoke all user tokens
message RevokeAllTokensRequest {
  string user_uuid = 1;
}
// Empty response
