syntax="proto3";

package auth;
option go_package = "github.com/unwelcome/FrameWorkTask1/backend/contracts/auth/generated;auth_proto";

import "google/protobuf/empty.proto";

service AuthService {
  rpc Health(google.protobuf.Empty) returns (HealthResponse);
  rpc Register(RegisterRequest) returns (google.protobuf.Empty);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc ChangePassword(ChangePasswordRequest) returns (google.protobuf.Empty);
  rpc UpdateUserBio(UpdateUserBioRequest) returns (google.protobuf.Empty);
  rpc DeleteUser(DeleteUserRequest) returns (google.protobuf.Empty);
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
  rpc GetAllActiveTokens(GetAllActiveTokensRequest) returns (GetAllActiveTokensResponse);
  rpc RevokeToken(RevokeTokenRequest) returns (google.protobuf.Empty);
  rpc RevokeAllTokens(RevokeAllTokensRequest) returns (google.protobuf.Empty);
  rpc VerifyAccount(VerifyAccountRequest) returns (google.protobuf.Empty);
  rpc ResendVerificationCode(ResendVerificationCodeRequest) returns (google.protobuf.Empty);
  rpc GetVerificationCodeByEmail(GetVerificationCodeByEmailRequest) returns (GetVerificationCodeResponse);
  rpc GetRecoveryCode(GetRecoveryCodeRequest) returns (GetRecoveryCodeResponse);
  rpc Get2FACode(Get2FACodeRequest) returns (Get2FACodeResponse);
  rpc ForgotPassword(ForgotPasswordRequest) returns (google.protobuf.Empty);
  rpc ResetPassword(ResetPasswordRequest) returns (google.protobuf.Empty);
  rpc Verify2FA(Verify2FARequest) returns (Verify2FAResponse);
  rpc UpdateUser2FA(UpdateUser2FARequest) returns (google.protobuf.Empty);
  rpc RestoreAccount(RestoreAccountRequest) returns (google.protobuf.Empty);
}


message Token {
  string token = 1;
  SessionInfo session = 2;
}

message SessionInfo {
  string ip = 1;
  string last_ip = 2;
  string isp = 3;
  string country_code = 4;
  string country_name = 5;
  string city = 6;
  string timezone = 7;
  string device_type = 8;
  string os = 9;
  string os_version = 10;
  string browser = 11;
  string browser_version = 12;
  string user_agent_raw = 13;
  int64 created_at = 14;
  int64 last_active_at = 15;
}


// Health
// Empty request
message HealthResponse {
  string service = 1;
  string postgres = 2;
  string redis = 3;
  string minio = 4;
  string mongo = 5;
}


// Register user
message RegisterRequest {
  string email = 1;
  string password = 2;
  string first_name = 3;
  string last_name = 4;
  string patronymic = 5;
}


// Login
message LoginRequest {
  string email = 1;
  string password = 2;
  SessionInfo session = 3;
}
message LoginResponse {
  string user_uuid = 1;
  string access_token = 2;
  string refresh_token = 3;
  string session_uuid = 4;
}


// Get user
message GetUserRequest {
  string user_uuid = 1;
}
message GetUserResponse {
  string user_uuid = 1;
  string email = 2;
  string first_name = 3;
  string last_name = 4;
  string patronymic = 5;
  string created_at = 6;
  string deleted_at = 7; // пустая строка если аккаунт активен
  string description = 8;
}


// Change user password
message ChangePasswordRequest {
  string user_uuid = 1;
  string old_password = 2;
  string password = 3;
}
// Empty response


// Update user bio
message UpdateUserBioRequest {
  string user_uuid = 1;
  string first_name = 2;
  string last_name = 3;
  string patronymic = 4;
  string description = 5;
}
// Empty response


// Delete user
message DeleteUserRequest {
  string user_uuid = 1;
}
// Empty response


// Refresh token
message RefreshTokenRequest {
  string refresh_token = 1;
  string ip = 2;
}
message RefreshTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
}


// Get all user active refresh tokens
message GetAllActiveTokensRequest {
  string user_uuid = 1;
}
message GetAllActiveTokensResponse{
  repeated Token tokens = 1;
}


// Revoke token
message RevokeTokenRequest {
  string user_uuid = 1;
  string token_hash = 2;
}
// Empty response


// Revoke all user tokens
message RevokeAllTokensRequest {
  string user_uuid = 1;
}
// Empty response


// Verify account
message VerifyAccountRequest {
  string email = 1;
  string code = 2;
}
// Empty response


// Resend verification code
message ResendVerificationCodeRequest {
  string email = 1;
}
// Empty response


// Get verification code (debug only)
message GetVerificationCodeByEmailRequest {
  string email = 1;
}
message GetVerificationCodeResponse {
  string code = 1;
}


// Get recovery code (debug only)
message GetRecoveryCodeRequest {
  string user_uuid = 1;
}
message GetRecoveryCodeResponse {
  string code = 1;
}


// Get 2FA code (debug only)
message Get2FACodeRequest {
  string session_uuid = 1;
}
message Get2FACodeResponse {
  string code = 1;
}


// Forgot password
message ForgotPasswordRequest {
  string email = 1;
}
// Empty response


// Reset password
message ResetPasswordRequest {
  string email = 1;
  string code = 2;
  string new_password = 3;
}
// Empty response


// Verify2FA
message Verify2FARequest {
  string session_uuid = 1;
  string code = 2;
  SessionInfo session = 3;
}
message Verify2FAResponse {
  string user_uuid = 1;
  string access_token = 2;
  string refresh_token = 3;
}


// UpdateUser2FA
message UpdateUser2FARequest {
  string user_uuid = 1;
  bool enable_2fa = 2;
}
// Empty response


// RestoreAccount
message RestoreAccountRequest {
  string email = 1;
  string password = 2;
}
// Empty response
