syntax="proto3";

package company;
option go_package = "github.com/unwelcome/FrameWorkTask1/backend/contracts/company/generated;company_proto";

import "google/protobuf/empty.proto";

service CompanyService {
  rpc Health(google.protobuf.Empty) returns (HealthResponse);
  //  Company
  rpc CreateCompany(CreateCompanyRequest) returns (CreateCompanyResponse);
  rpc GetCompany(GetCompanyRequest) returns (GetCompanyResponse);
  rpc GetCompanies(GetCompaniesRequest) returns (GetCompaniesResponse);
  rpc GetUserCompanies(GetUserCompaniesRequest) returns (GetUserCompaniesResponse);
  rpc UpdateCompanyTitle(UpdateCompanyTitleRequest) returns (google.protobuf.Empty);
  rpc UpdateCompanyStatus(UpdateCompanyStatusRequest) returns (google.protobuf.Empty);
  rpc DeleteCompany(DeleteCompanyRequest) returns (google.protobuf.Empty);
  // Join code
  rpc CreateCompanyJoinCode(CreateCompanyJoinCodeRequest) returns (CreateCompanyJoinCodeResponse);
  rpc GetCompanyJoinCodes(GetCompanyJoinCodesRequest) returns (GetCompanyJoinCodesResponse);
  rpc DeleteCompanyJoinCode(DeleteCompanyJoinCodeRequest) returns (google.protobuf.Empty);
  // Employee
  rpc JoinCompany(JoinCompanyRequest) returns (JoinCompanyResponse);
  rpc GetCompanyEmployee(GetCompanyEmployeeRequest) returns (GetCompanyEmployeeResponse);
  rpc GetCompanyEmployees(GetCompanyEmployeesRequest) returns (GetCompanyEmployeesResponse);
  rpc GetCompanyEmployeesSummary(GetCompanyEmployeesSummaryRequest) returns (GetCompanyEmployeesSummaryResponse);
  rpc UpdateEmployeeRole(UpdateEmployeeRoleRequest) returns (google.protobuf.Empty);
  rpc RemoveCompanyEmployee(RemoveCompanyEmployeeRequest) returns (google.protobuf.Empty);
  // CheckColleagues
  rpc CheckColleagues(CheckColleaguesRequest) returns (CheckColleaguesResponse);
  // Departments
  rpc CreateDepartment(CreateDepartmentRequest) returns (CreateDepartmentResponse);
  rpc AddEmployeeToDepartment(AddEmployeeToDepartmentRequest) returns (google.protobuf.Empty);
  rpc GetDepartment(GetDepartmentRequest) returns (GetDepartmentResponse);
  rpc GetCompanyDepartments(GetCompanyDepartmentsRequest) returns (GetCompanyDepartmentsResponse);
  rpc UpdateDepartmentTitle(UpdateDepartmentTitleRequest) returns (google.protobuf.Empty);
  rpc DeleteDepartment(DeleteDepartmentRequest) returns (google.protobuf.Empty);
  rpc RemoveEmployeeFromDepartment(RemoveEmployeeFromDepartmentRequest) returns (google.protobuf.Empty);
}


message Company {
  string company_uuid = 1;
  string title = 2;
  string status = 3;
}

message Employee {
  string user_uuid = 1;
  string role = 2;
  string department_uuid = 3;
  string joined_at = 4;
}

message Department {
  string department_uuid = 1;
  string title = 2;
}


// Health
// Empty request
message HealthResponse {
  string service = 1;
  string postgres = 2;
  string redis = 3;
  string minio = 4;
  string mongo = 5;
}


// CreateCompany
message CreateCompanyRequest {
  string initiator_uuid = 1;
  string title = 2;
}
message CreateCompanyResponse {
  string company_uuid = 1;
}


// GetCompany
message GetCompanyRequest {
  string initiator_uuid = 1;
  string company_uuid = 2;
}
message GetCompanyResponse {
  string company_uuid = 1;
  string title = 2;
  string status = 3;
}


// GetCompanies 
message GetCompaniesRequest {
  int64 offset = 1;
  int64 count = 2;
}
message GetCompaniesResponse {
  repeated Company companies = 1;
}


// GetUserCompanies
message GetUserCompaniesRequest {
  string initiator_uuid = 1;
}
message GetUserCompaniesResponse {
  repeated Company companies = 1;
}


// UpdateCompanyTitle
message UpdateCompanyTitleRequest {
  string initiator_uuid = 1;
  string company_uuid = 2;
  string title = 3;
}
// Empty response


//UpdateCompanyStatus
message UpdateCompanyStatusRequest {
  string initiator_uuid = 1;
  string company_uuid = 2;
  string status = 3;
}
// Empty response


// DeleteCompany
message DeleteCompanyRequest {
  string initiator_uuid = 1;
  string company_uuid = 2;
}
// Empty response


// CreateCompanyJoinCode
message CreateCompanyJoinCodeRequest {
  string initiator_uuid = 1;
  string company_uuid = 2;
  int64 code_ttl = 3;
}
message CreateCompanyJoinCodeResponse {
  string join_code = 1;
}


// GetCompanyJoinCodes
message GetCompanyJoinCodesRequest {
  string initiator_uuid = 1;
  string company_uuid = 2;
}
message GetCompanyJoinCodesResponse {
  repeated string codes = 1;
}


// DeleteCompanyJoinCodes
message DeleteCompanyJoinCodeRequest {
  string initiator_uuid = 1;
  string company_uuid = 2;
  string code = 3;
}
// Empty response


// JoinCompany
message JoinCompanyRequest {
  string initiator_uuid = 1;
  string join_code = 2;
}
message JoinCompanyResponse {
  string company_uuid = 1;
  string role = 2;
}


// GetCompanyEmployee
message GetCompanyEmployeeRequest {
  string initiator_uuid = 1;
  string target_uuid = 2;
  string company_uuid = 3;
}
message GetCompanyEmployeeResponse {
  string role = 1;
  string department_uuid = 2;
  string joined_at = 3;
}


// GetCompanyEmployees
message GetCompanyEmployeesRequest {
  string initiator_uuid = 1;
  string company_uuid = 2;
  string role = 3;
  string department_uuid = 4;
  int64 count = 5;
  int64 offset = 6;
}
message GetCompanyEmployeesResponse {
  repeated Employee employees = 1;
}


// GetCompanyEmployeesSummary
message GetCompanyEmployeesSummaryRequest {
  string initiator_uuid = 1;
  string company_uuid = 2;
  string department_uuid = 3;
}
message GetCompanyEmployeesSummaryResponse {
  int64 chief_count = 1;
  int64 analytics_count = 2;
  int64 manager_count = 3;
  int64 engineer_count = 4;
  int64 inspector_count = 5;
  int64 unemployed_count = 6;
}


// UpdateEmployeeRole
message UpdateEmployeeRoleRequest {
  string initiator_uuid = 1;
  string target_uuid = 2;
  string company_uuid = 3;
  string role = 4;
}
// Empty response


// RemoveCompanyEmployee
message RemoveCompanyEmployeeRequest {
  string initiator_uuid = 1;
  string company_uuid = 2;
  string target_uuid = 3;
}
// Empty response


// CreateDepartment
message CreateDepartmentRequest {
  string initiator_uuid = 1;
  string company_uuid = 2;
  string title = 3;
}
message CreateDepartmentResponse {
  string department_uuid = 1;
}


// AddEmployeeToDepartment
message AddEmployeeToDepartmentRequest {
  string initiator_uuid = 1;
  string department_uuid = 2;
  string target_uuid = 3;
}
// Empty response


// GetDepartment
message GetDepartmentRequest {
  string initiator_uuid = 1;
  string department_uuid = 2;
}
message GetDepartmentResponse {
  string department_uuid = 1;
  string company_uuid = 2;
  string title = 3;
  string created_at = 4;
  string created_by = 5;
}


// GetCompanyDepartments
message GetCompanyDepartmentsRequest {
  string initiator_uuid = 1;
  string company_uuid = 2;
  int64 offset = 3;
  int64 count = 4;
}
message GetCompanyDepartmentsResponse {
  repeated Department departments = 1;
}


// UpdateDepartmentTitle
message UpdateDepartmentTitleRequest {
  string initiator_uuid = 1;
  string department_uuid = 2;
  string title = 3;
}
// Empty response


// DeleteDepartment
message DeleteDepartmentRequest {
  string initiator_uuid = 1;
  string department_uuid = 2;
}
// Empty response


// RemoveEmployeeFromDepartment
message RemoveEmployeeFromDepartmentRequest {
  string initiator_uuid = 1;
  string department_uuid = 2;
  string target_uuid = 3;
}
// Empty response


// CheckColleagues
message CheckColleaguesRequest {
  string initiator_uuid = 1;
  string target_uuid = 2;
}
message CheckColleaguesResponse {
  bool are_colleagues = 1;
}