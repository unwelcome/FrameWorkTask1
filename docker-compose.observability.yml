# Запуск вместе с основным стеком:
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d
#
# Запуск только observability (основной стек уже работает):
#   docker compose -f docker-compose.observability.yml up -d

services:
  loki:
    container_name: loki
    image: grafana/loki:3.5.0
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki:/etc/loki
      - loki_data:/loki
    command: -config.file=/etc/loki/config.yml
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O /dev/null http://localhost:3100/ready || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - app-network

  promtail:
    container_name: promtail
    image: grafana/promtail:3.5.0
    volumes:
      - ./observability/promtail:/etc/promtail
      - ./logs:/var/log/app:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  prometheus:
    container_name: prometheus
    image: prom/prometheus:v3.12.0
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    restart: unless-stopped
    networks:
      - app-network

  grafana:
    container_name: grafana
    image: grafana/grafana:12.2.0
    ports:
      - "3000:3000"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    env_file:
      - ./observability/.env
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    networks:
      - app-network

  redis_exporter:
    container_name: redis_exporter
    image: oliver006/redis_exporter:v1.70.0
    environment:
      REDIS_ADDR: "redis://${REDIS_HOST}:${REDIS_PORT}"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    restart: unless-stopped
    networks:
      - app-network

  postgres_exporter:
    container_name: postgres_exporter
    image: prometheuscommunity/postgres-exporter:v0.17.0
    ports:
      - "9187:9187"
    volumes:
      - ./observability/postgres_exporter:/etc/postgres_exporter
    command:
      - --config.file=/etc/postgres_exporter/config.yml
    env_file:
      - ./observability/.env
    restart: unless-stopped
    networks:
      - app-network

  node_exporter:
    container_name: node_exporter
    image: prom/node-exporter:v1.9.1
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.rootfs=/rootfs
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    external: true
    name: app-network

volumes:
  loki_data:
  prometheus_data:
  grafana_data:
