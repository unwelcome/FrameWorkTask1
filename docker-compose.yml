x-postgres-command: &postgres-command
  command:
    - "postgres"
    - "-c"
    - "max_connections=50"
    - "-c"
    - "shared_buffers=128MB"
    - "-c"
    - "effective_cache_size=512MB"
    - "-c"
    - "work_mem=8MB"
    - "-c"
    - "random_page_cost=1.1"
    - "-c"
    - "log_min_duration_statement=200ms"
    - "-c"
    - "lock_timeout=1s"
    - "-c"
    - "statement_timeout=60s"
    - "-c"
    - "shared_preload_libraries=pg_stat_statements"
    - "-c"
    - "pg_stat_statements.max=10000"
    - "-c"
    - "pg_stat_statements.track=all"
  restart: unless-stopped
  healthcheck:
    test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
    interval: 5s
    timeout: 5s
    retries: 10
    start_period: 5s

services:
  gateway:
    container_name: gateway
    build:
      context: backend
      dockerfile: gateway/Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./.env
      - ./backend/gateway/.env
    volumes:
      - ./logs:/var/log/app
      - ./backend/keys/public.pem:/run/secrets/jwt_public.pem:ro
    networks:
      - app-network

  auth_service:
    container_name: auth_service
    build:
      context: backend
      dockerfile: auth/Dockerfile
    env_file:
      - ./.env
      - ./backend/auth/.env
    volumes:
      - ./logs:/var/log/app
      - ./backend/keys/private.pem:/run/secrets/jwt_private.pem:ro
    depends_on:
      auth_service_postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  company_service:
    container_name: company_service
    build:
      context: backend
      dockerfile: company/Dockerfile
    env_file:
      - ./.env
      - ./backend/company/.env
    volumes:
      - ./logs:/var/log/app
    depends_on:
      company_service_postgres:
        condition: service_healthy
      redis:
         condition: service_healthy
    networks:
      - app-network

  application_service:
    container_name: application_service
    build:
      context: backend
      dockerfile: application/Dockerfile
    env_file:
      - ./.env
      - ./backend/application/.env
    volumes:
      - ./logs:/var/log/app
    depends_on:
      application_service_postgres:
        condition: service_healthy
    networks:
      - app-network

  auth_service_postgres:
    container_name: auth_postgres
    image: postgres:17
    env_file:
      - ./backend/auth/.env
    <<: *postgres-command
    volumes:
      - db_data_auth_service:/var/lib/postgresql/data
    networks:
      - app-network

  company_service_postgres:
    container_name: company_postgres
    image: postgres:17
    env_file:
      - ./backend/company/.env
    <<: *postgres-command
    volumes:
      - db_data_company_service:/var/lib/postgresql/data
    networks:
      - app-network

  application_service_postgres:
    container_name: application_postgres
    image: postgres:17
    env_file:
      - ./backend/application/.env
    <<: *postgres-command
    volumes:
      - db_data_application_service:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    container_name: redis
    image: redis:8.0-alpine
    env_file:
      - ./.env
    volumes:
      - redis_data:/data
    command:
      - redis-server
      - --requirepass ${REDIS_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network

